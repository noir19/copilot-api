services:
  copilot-api:
    image: copilot-api:latest
    build: .
    ports:
      - "4141:4141"
    volumes:
      # Mount the whole application data directory so both:
      # 1. the managed GitHub token file
      # 2. the SQLite dashboard database
      # are persisted across restarts.
      #
      # You can populate github_token by running: copilot-api auth
      - /path/to/copilot-data:/root/.local/share/copilot-api
    environment:
      # Read GitHub token from the mounted application data directory
      - GH_TOKEN_FILE=/root/.local/share/copilot-api/github_token
      # Optional: override the SQLite path if you do not want the default location
      # - COPILOT_API_DB_PATH=/root/.local/share/copilot-api/copilot-api.db
      # Alternatively, pass token directly (GH_TOKEN_FILE takes priority if both set)
      # - GH_TOKEN=your_token_here
      # Uncomment to enable verbose logging
      # - VERBOSE=true
    restart: unless-stopped
