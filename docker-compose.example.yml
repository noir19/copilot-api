services:
  copilot-api:
    image: copilot-api:latest
    build: .
    ports:
      - "4141:4141"
    volumes:
      # Mount your GitHub token file (plain token, no key=value format)
      # Token file is generated by running: copilot-api auth
      - /path/to/github_token:/run/secrets/gh_token:ro
      # Optional: mount custom model alias config
      # - ./model-aliases.json:/app/model-aliases.json:ro
    environment:
      # Read GitHub token from mounted file (takes priority over GH_TOKEN)
      - GH_TOKEN_FILE=/run/secrets/gh_token
      # Alternatively, pass token directly (GH_TOKEN_FILE takes priority if both set)
      # - GH_TOKEN=your_token_here
      # Uncomment to enable verbose logging
      # - VERBOSE=true
    restart: unless-stopped
